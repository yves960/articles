name: Dispatch to FireworksLife

on:
  push:
    branches:
      - main
    paths:
      # 只在顶级 .md 文件变化时触发（排除子目录和配置文件）
      - "*.md"
      - "!README.md"
      - "!AGENTS.md"
      - "!SOUL.md"
      - "!IDENTITY.md"
      - "!USER.md"
      - "!TOOLS.md"
      - "!HEARTBEAT.md"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to FireworksLife
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/yves960/FireworksLife/dispatches \
            -d '{"event_type":"articles-updated","client_payload":{"message":"articles updated"}}}'
