name: Dispatch to FireworksLife

on:
  push:
    branches:
      - main
    paths:
      # 只在顶级 .md 文章文件变化时触发（排除子目录和配置文件）
      - "*.md"
      - "!README.md"
      - "!AGENTS.md"
      - "!SOUL.md"
      - "!IDENTITY.md"
      - "!USER.md"
      - "!TOOLS.md"
      - "!HEARTBEAT.md"
  # 手动触发（方便测试和临时同步）
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to FireworksLife sync workflow
        run: |
          echo "🚀 触发 FireworksLife 同步..."
          result=$(curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/yves960/FireworksLife/dispatches \
            -d '{"event_type":"articles-updated"}')
          echo "响应: $result"
          echo "✅ 已触发！FireworksLife 会在 content 分支暂存文章"
          echo "💡 需要发布时：在 FireworksLife 仓库手动触发 'Deploy to Netlify' workflow"
